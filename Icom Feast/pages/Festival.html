<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravEdu - Ensiklopedia Festival Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f3f4f6;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --border-color: #e5e7eb;
        --card-bg: #ffffff;
        --nav-bg: rgba(255, 255, 255, 0.95);
        --dropdown-bg: #ffffff;
        --nav-text: #1f2937;
        --nav-text-hover: #dc2626;
      }

 
      html.dark-mode {
        --bg-primary: #000000;
        --bg-secondary: #141c22;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --border-color: #252534;
        --card-bg: #3d3d3d;
        --nav-bg: rgba(21, 24, 29, 0.95);
        --dropdown-bg: #424242;
        --input-bg: rgba(45, 45, 45, 0.05);
        --input-border: #646464;
      }

/* Animasi Loading */
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-icon { animation: spin-slow 2s linear infinite; }

      body {
        background-color: #050505;
        color: white;
        scroll-behavior: smooth;
      }

      html.dark-mode body {
        background-color: #0f172a;
        color: #f1f5f9;
      }

      .bg-hero {
        background-size: cover;
        background-position: center;
        transition: background-image 0.8s ease-in-out;
        position: relative;
      }
      .hero-overlay {
        background: linear-gradient(
          to top,
          rgba(5, 5, 5, 1),
          rgba(0, 0, 0, 0.4),
          rgba(0, 0, 0, 0.2)
        );
        position: absolute;
        inset: 0;
      }
      .dropdown-menu {
        display: none;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s ease;
      }
      .dropdown-menu.show {
        display: block;
        opacity: 1;
        transform: translateY(0);
      }
      .month-btn {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
        letter-spacing: 0.1em;
        position: relative;
        overflow: hidden;
      }
      .month-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.4);
        color: white;
        transform: translateY(-2px);
      }
      .month-btn.active {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        font-weight: bold;
        border-color: #ef4444;
        box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }
      .month-btn.active:hover {
        box-shadow: 0 12px 30px rgba(239, 68, 68, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        transform: scale(1.08);
      }
      #festival-overlay {
        backdrop-filter: blur(20px);
        transition: all 0.5s ease;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes shimmer {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .animate-card {
        animation: fadeInUp 0.6s ease forwards;
      }

      .animate-slide {
        animation: slideInDown 0.5s ease forwards;
      }

      .animate-scale {
        animation: scaleIn 0.5s ease forwards;
      }

      .hero-text {
        animation: slideInDown 0.8s ease forwards;
      }

      .festival-card {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(249, 115, 22, 0.05) 100%);
      }

      .festival-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .festival-card:hover {
        transform: translateY(-8px);
        border-color: rgba(239, 68, 68, 0.5);
        box-shadow: 0 20px 40px rgba(239, 68, 68, 0.2);
      }

      .festival-card:hover::before {
        opacity: 1;
      }

      .festival-card img {
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .festival-card:hover img {
        transform: scale(1.08) rotate(1deg);
      }

      .festival-card-content {
        padding: 24px;
        position: relative;
        z-index: 10;
      }

      .festival-card h3 {
        font-size: 1.375rem;
        font-weight: 900;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #ef4444, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }

      .festival-card p {
        font-size: 0.95rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.7);
      }

      .read-more-btn {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 24px;
        background: linear-gradient(135deg, #ef4444, #f97316);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        transform: translateY(0);
      }

      .read-more-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
      }

      .overlay-title {
        background: linear-gradient(135deg, #ef4444, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .theme-toggle {
        position: relative;
        width: 50px;
        height: 28px;
        background-color: #cbd5e1;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        padding: 2px;
        display: flex;
        align-items: center;
      }

      html.dark-mode .theme-toggle {
        background-color: #334155;
      }

      .theme-toggle::after {
        content: '';
        position: absolute;
        left: 3px;
        top: 3px;
        width: 22px;
        height: 22px;
        background-color: white;
        border-radius: 50%;
        transition: left 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      html.dark-mode .theme-toggle::after {
        left: 25px;
      }

      .lang-toggle {
        background-color: #e5e7eb;
        border: 2px solid #d1d5db;
        padding: 4px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-primary);
      }

      html.dark-mode .lang-toggle {
        background-color: #334155;
        border-color: #475569;
      }

      .lang-toggle:hover {
        background-color: #dc2626;
        color: white;
        border-color: #dc2626;
      }

      .lang-toggle.active {
        background-color: #dc2626;
        color: white;
        border-color: #dc2626;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444;
      }

      /* Search input styling */
      #search-container input {
        padding: 12px 0;
        font-size: 1.125rem;
        line-height: 1.75rem;
      }

      #search-container input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      html.dark-mode #search-container input::placeholder {
        color: rgba(241, 245, 249, 0.5);
      }
    </style>
  </head>
  <body class="font-sans overflow-x-hidden">

    <nav
      class="fixed top-0 w-full z-50 backdrop-blur-md border-b transition-all duration-300"
      style="background-color: var(--nav-bg); border-bottom-color: var(--border-color);"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16 relative">
          <div class="flex-shrink-0 flex items-center">
            <span
              class="text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-400 bg-clip-text text-transparent cursor-pointer"
              >Trav Edu</span
            >
          </div>

          <div class="hidden md:flex space-x-8 items-center">
           <a
              href="index.html#home-section"
              class="font-medium transition"
              style="color: var(--text-primary);"
              onmouseover="this.style.color='#dc2626'"
              onmouseout="this.style.color='var(--text-primary)'"
              data-i18n="home"
              >Home</a
            >
            <a
              href="index.html"
              class="font-medium transition"
              style="color: var(--text-primary);"
              onmouseover="this.style.color='#dc2626'"
              onmouseout="this.style.color='var(--text-primary)'"
              data-i18n="about"
              >About</a
            >

            <a 
              href="Festival.html"
              class="font-medium transition"
              style="color : var(--text-primary)"
              onmouseover="this.style.color='#dc2626'"
              onmouseout="this.style.color='var(--text-primary)'"
              data-i18n="festival"
            >Festival</a>

            <a 
              href="KulinerSection.html"
              class="font-medium transition"
              style="color : var(--text-primary)"
              onmouseover="this.style.color='#dc2626'"
              onmouseout="this.style.color='var(--text-primary)'"
              data-i18n="kuliner"
            >Culinary</a>
          </div>

          <div class="flex items-center space-x-4">
            <button
              id="lang-toggle"
              class="lang-toggle"
              title="Toggle language"
              aria-label="Toggle language"
            >
              <i class="fas fa-globe"></i>
              <span id="lang-text">EN</span>
            </button>
            <button
              id="theme-toggle"
              class="theme-toggle"
              title="Toggle dark mode"
              aria-label="Toggle dark mode"
            >
              <i class="fas fa-sun" style="color: #fbbf24; font-size: 10px; margin: 9px;"></i>
              <i class="fas fa-moon" style="color: #60a5fa; font-size: 10px;"></i>
            </button>
            <button
              id="search-btn"
              class="p-2 transition focus:outline-none"
              style="color: var(--text-primary);"
              onmouseover="this.style.color='#dc2626'"
              onmouseout="this.style.color='var(--text-primary)'"
            >
              <i class="fas fa-search" style="color: var(--text-primary)"></i>
            </button>
            <a
              href="#"
              class="hidden sm:block bg-red-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-red-700 shadow-lg"
              data-i18n="explore-now"
              >Explore Now</a
            >
          </div>

          <div
            id="search-container"
            class="fixed left-0 right-0 top-16 z-40 max-h-0 overflow-hidden shadow-sm backdrop-blur-lg transition-all duration-300"
            style="background-color: var(--nav-bg); max-height: 0;"
          >
            <div class="flex flex-col items-stretch px-4 sm:px-8 py-6 max-w-7xl mx-auto">
              <div class="flex items-center">
                <i class="fas fa-search text-red-600 mr-4 text-lg flex-shrink-0"></i>
                <input 
                  type="text" 
                  placeholder="Search festival, city, or cuisine..." 
                  class="w-full outline-none text-lg transition-colors duration-300 focus:ring-0 py-3" 
                  style="background-color: var(--input-bg); color: var(--text-primary); border-bottom: 2px solid var(--input-border);"
                  onmouseover="this.style.borderBottomColor='#dc2626'"
                  onfocus="this.style.borderBottomColor='#dc2626'"
                  onblur="this.style.borderBottomColor='var(--input-border)'"
                />
                <button 
                  id="close-search" 
                  class="p-2 transition-colors duration-300 ml-4 flex-shrink-0" 
                  style="color: var(--text-secondary);"
                  onmouseover="this.style.color='#dc2626'"
                  onmouseout="this.style.color='var(--text-secondary)'"
                >
                  <i class="fas fa-times text-2xl"></i>
                </button>
              </div>
              
              <div id="search-suggestions" class="mt-4 space-y-2"></div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div
      id="hero-section"
      class="relative h-screen w-full bg-hero flex items-center justify-center overflow-hidden"
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&q=80&w=2000&quot;);
      "
    >
      <div class="hero-overlay"></div>

      <div class="relative z-10 text-center px-4">
        <span
          class="text-red-500 font-bold tracking-[0.5em] uppercase mb-4 block animate-pulse hero-text"
          data-i18n="jelajahi_budaya_indonesia"
          >Explore Indonesian Culture</span
        >
        <h1
          id="place-name"
          class="text-6xl md:text-[120px] font-black tracking-tighter transition-all duration-700 uppercase leading-none mb-6 hero-text"
          style="animation-delay: 0.1s"
        >
          BALI
        </h1>
        <p
          id="place-desc"
          class="max-w-2xl mx-auto text-lg md:text-xl text-gray-300 font-light leading-relaxed hero-text"
          style="animation-delay: 0.2s"
        >
          The Island of Gods and Endless Festivals
        </p>
      </div>

      <div class="absolute bottom-16 w-full flex justify-center z-20 px-4">
        <div
          class="flex flex-wrap justify-center gap-2 sm:gap-3 lg:gap-4 bg-gradient-to-r from-black/40 via-red-600/10 to-black/40 backdrop-blur-xl p-4 sm:p-6 rounded-full border border-white/20 shadow-2xl hover:border-red-500/40 transition-all duration-300 w-full max-w-3xl"
        >
          <button
            onclick="changeCity('Bali', this) "
            class="month-btn active px-4 sm:px-6 py-2.5 sm:py-3 rounded-full text-xs sm:text-sm uppercase tracking-wider font-bold"
          >
            Bali
          </button>
          <button
            onclick="changeCity('Jogja', this)"
            class="month-btn px-4 sm:px-6 py-2.5 sm:py-3 rounded-full text-xs sm:text-sm uppercase tracking-wider font-bold"
          >
            Jogja
          </button>
          <button
            onclick="changeCity('Jakarta', this)"
            class="month-btn px-4 sm:px-6 py-2.5 sm:py-3 rounded-full text-xs sm:text-sm uppercase tracking-wider font-bold"
          >
            Jakarta
          </button>
          <button
            onclick="changeCity('Bandung', this)"
            class="month-btn px-4 sm:px-6 py-2.5 sm:py-3 rounded-full text-xs sm:text-sm uppercase tracking-wider font-bold"
          >
            Bandung
          </button>
          <button
            onclick="changeCity('Malang', this)"
            class="month-btn px-4 sm:px-6 py-2.5 sm:py-3 rounded-full text-xs sm:text-sm uppercase tracking-wider font-bold"
          >
            Malang
          </button>
        </div>
      </div>
    </div>

    <div
      id="festival-overlay"
      class="fixed inset-0 z-[60] bg-black hidden flex-col items-center overflow-y-auto p-8 pt-32"
      style="background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.9) 100%);"
    >
      <button
        onclick="closeOverlay()"
        class="fixed top-10 right-10 text-4xl hover:text-red-500 z-[70] transition-all duration-300 hover:rotate-90 hover:scale-110"
      >
        <i class="fas fa-times"></i>
      </button>
      <div class="max-w-6xl w-full mb-16 border-l-4 border-red-600 pl-8 animate-slide">
        <h2
          id="overlay-city-title"
          class="text-7xl font-black uppercase tracking-tighter mb-2 overlay-title"
        ></h2>
        <p class="text-red-400 font-bold tracking-widest uppercase text-sm" data-i18n="katalog_festival_budaya_pilihan">
          Selected Cultural Festival Catalog
        </p>
      </div>
      <div
        id="festival-list"
        class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl w-full pb-32"
      ></div>
    </div>

    <div
      id="article-modal"
      class="fixed inset-0 z-[80] hidden items-center justify-center p-0 md:p-10 backdrop-blur-xl animate-scale"
      style="background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);"
    >
      <div
        class="bg-zinc-950 w-full max-w-6xl h-full md:h-auto md:max-h-[90vh] rounded-none md:rounded-[40px] overflow-y-auto relative border border-red-500/20 shadow-2xl hover:border-red-500/40 transition-all duration-300"
        style="background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);"
      >
        <button
          onclick="closeArticle()"
          class="sticky top-6 float-right mr-6 text-2xl hover:text-red-500 z-[90] bg-red-600/10 hover:bg-red-600/20 w-12 h-12 rounded-full border border-red-500/20 flex items-center justify-center transition-all duration-300 hover:scale-110"
        >
          <i class="fas fa-times"></i>
        </button>
        <div id="article-content" class="text-gray-300"></div>
      </div>
    </div>

    <script src="../js/Festival.js"></script>

  <script>
    // Loading & Transition
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-overlay');
            const mainContent = document.getElementById('main-content');
            
              setTimeout(() => {
                  loader.style.opacity = '0';
                mainContent.style.opacity = '1';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 2000); // 2 Detik loading agar elegan
        });
  </script>

  </body>
</html>
